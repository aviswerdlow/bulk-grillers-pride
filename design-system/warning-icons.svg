<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48">
  <title>Warning Level Icons</title>
  <desc>Icon set for 5 warning severity levels</desc>
  
  <!-- Level 1: Info (Circle with i) -->
  <g id="warning-info" transform="translate(0, 0)">
    <circle cx="24" cy="24" r="20" fill="none" stroke="currentColor" stroke-width="2"/>
    <circle cx="24" cy="14" r="2" fill="currentColor"/>
    <rect x="22" y="20" width="4" height="12" rx="2" fill="currentColor"/>
  </g>
  
  <!-- Level 2: Success (Circle with checkmark) -->
  <g id="warning-success" transform="translate(48, 0)">
    <circle cx="24" cy="24" r="20" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M16 24 L21 29 L32 18" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Level 3: Warning (Triangle with !) -->
  <g id="warning-caution" transform="translate(96, 0)">
    <path d="M24 6 L44 38 L4 38 Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="24" cy="30" r="2" fill="currentColor"/>
    <rect x="22" y="16" width="4" height="10" rx="2" fill="currentColor"/>
  </g>
  
  <!-- Level 4: Error (Circle with X) -->
  <g id="warning-error" transform="translate(144, 0)">
    <circle cx="24" cy="24" r="20" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M16 16 L32 32 M32 16 L16 32" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Level 5: Critical (Octagon with !) -->
  <g id="warning-critical" transform="translate(192, 0)">
    <path d="M16 6 L32 6 L42 16 L42 32 L32 42 L16 42 L6 32 L6 16 Z" fill="none" stroke="currentColor" stroke-width="2"/>
    <circle cx="24" cy="32" r="2" fill="currentColor"/>
    <rect x="22" y="14" width="4" height="14" rx="2" fill="currentColor"/>
  </g>
</svg>