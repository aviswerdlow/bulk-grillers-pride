name: Performance Benchmark

on:
  # Run on PRs that modify AI categorization code
  pull_request:
    paths:
      - 'convex/functions/ai/**'
      - 'convex/functions/benchmarks/**'
      - '.github/workflows/performance-benchmark.yml'

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      comparison_type:
        description: 'Type of benchmark to run'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick # Fast A/B test (100 products)
          - standard # Standard benchmark (multiple configs)
          - full # Full suite (all providers and configs)

      baseline_system:
        description: 'Baseline system'
        required: true
        default: 'langchain'
        type: choice
        options:
          - langchain
          - crewai

      test_system:
        description: 'Test system'
        required: true
        default: 'crewai'
        type: choice
        options:
          - langchain
          - crewai

jobs:
  benchmark:
    name: Run Performance Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Convex
        run: |
          cd convex
          npx convex deploy --cmd 'npm run build'
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Run Quick Benchmark (PR)
        if: github.event_name == 'pull_request'
        run: |
          npm run benchmark:quick -- \
            --baseline langchain \
            --test crewai \
            --provider openai \
            --products 50 \
            --iterations 3
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      - name: Run Selected Benchmark (Manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.comparison_type }}" = "quick" ]; then
            npm run benchmark:quick -- \
              --baseline ${{ inputs.baseline_system }} \
              --test ${{ inputs.test_system }} \
              --provider openai
          elif [ "${{ inputs.comparison_type }}" = "standard" ]; then
            npm run benchmark:standard
          else
            npm run benchmark:full
          fi
        env:
          CONVEX_URL: ${{ secrets.CONVEX_URL }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      - name: Generate Benchmark Report
        id: report
        run: |
          npm run benchmark:report -- --output benchmark-results.json

          # Extract key metrics for PR comment
          RESPONSE_TIME=$(jq -r '.crewai.responseTime.p95' benchmark-results.json)
          THROUGHPUT=$(jq -r '.crewai.throughput.mean' benchmark-results.json)
          ERROR_RATE=$(jq -r '.crewai.quality.errorRate' benchmark-results.json)
          IMPROVEMENT=$(jq -r '.comparison.responseTimeImprovement.p95' benchmark-results.json)

          echo "response_time=$RESPONSE_TIME" >> $GITHUB_OUTPUT
          echo "throughput=$THROUGHPUT" >> $GITHUB_OUTPUT
          echo "error_rate=$ERROR_RATE" >> $GITHUB_OUTPUT
          echo "improvement=$IMPROVEMENT" >> $GITHUB_OUTPUT

      - name: Check for Regression
        id: regression
        run: |
          # Run regression check against baseline
          npm run benchmark:check-regression -- \
            --threshold 0.10 \
            --baseline main

          # Capture exit code
          if [ $? -eq 0 ]; then
            echo "regression=false" >> $GITHUB_OUTPUT
          else
            echo "regression=true" >> $GITHUB_OUTPUT
          fi

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-results.json
            benchmark-report.html

      - name: Comment PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('benchmark-results.json', 'utf8'));

            const comment = `## 📊 Performance Benchmark Results

            ### CrewAI Performance Metrics
            - **Response Time (P95)**: ${results.crewai.responseTime.p95}ms
            - **Throughput**: ${Math.round(results.crewai.throughput.mean)} products/min
            - **Error Rate**: ${(results.crewai.quality.errorRate * 100).toFixed(2)}%
            - **Accuracy**: ${(results.crewai.quality.accuracy * 100).toFixed(2)}%

            ### Comparison vs LangChain
            - **Response Time**: ${results.comparison.responseTimeImprovement.p95 > 0 ? '✅' : '❌'} ${Math.abs(results.comparison.responseTimeImprovement.p95).toFixed(1)}% ${results.comparison.responseTimeImprovement.p95 > 0 ? 'faster' : 'slower'}
            - **Throughput**: ${results.comparison.throughputImprovement > 0 ? '✅' : '❌'} ${Math.abs(results.comparison.throughputImprovement).toFixed(1)}% ${results.comparison.throughputImprovement > 0 ? 'higher' : 'lower'}
            - **Cost**: ${results.comparison.costReduction > 0 ? '✅' : '❌'} ${Math.abs(results.comparison.costReduction).toFixed(1)}% ${results.comparison.costReduction > 0 ? 'cheaper' : 'more expensive'}
            - **Accuracy**: ${results.comparison.accuracyImprovement > 0 ? '✅' : '❌'} ${Math.abs(results.comparison.accuracyImprovement).toFixed(1)}% ${results.comparison.accuracyImprovement > 0 ? 'better' : 'worse'}

            ### Success Criteria
            - Response Time < 5s (P95): ${results.comparison.meetsSuccessCriteria.responseTime ? '✅ Pass' : '❌ Fail'}
            - Throughput > 750 products/min: ${results.comparison.meetsSuccessCriteria.throughput ? '✅ Pass' : '❌ Fail'}
            - Error Rate < 1%: ${results.comparison.meetsSuccessCriteria.errorRate ? '✅ Pass' : '❌ Fail'}

            ${results.recommendation}

            <details>
            <summary>View detailed benchmark report</summary>

            [Download full report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            </details>`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail if Regression Detected
        if: steps.regression.outputs.regression == 'true'
        run: |
          echo "❌ Performance regression detected!"
          echo "Response time or throughput degraded by more than 10%"
          exit 1

  benchmark-status:
    name: Benchmark Status Check
    runs-on: ubuntu-latest
    needs: benchmark
    if: always()

    steps:
      - name: Set Status
        uses: actions/github-script@v7
        with:
          script: |
            const { data: { statuses } } = await github.rest.repos.listCommitStatusesForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha
            });

            const benchmarkStatus = statuses.find(s => s.context === 'Performance Benchmark');

            if (!benchmarkStatus || benchmarkStatus.state !== 'success') {
              core.setFailed('Performance benchmark failed or did not complete');
            }
