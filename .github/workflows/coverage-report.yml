name: Coverage Report

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

jobs:
  coverage:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run tests with coverage
      run: npm run test:coverage
      continue-on-error: true
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
    
    - name: Coverage Summary
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const coverage = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json', 'utf8'));
          const total = coverage.total;
          
          const comment = `## 📊 Test Coverage Report
          
          | Metric | Coverage | Target |
          |--------|----------|--------|
          | Statements | ${total.statements.pct.toFixed(2)}% | 15% |
          | Branches | ${total.branches.pct.toFixed(2)}% | 15% |
          | Functions | ${total.functions.pct.toFixed(2)}% | 15% |
          | Lines | ${total.lines.pct.toFixed(2)}% | 15% |
          
          ${total.lines.pct >= 15 ? '✅ Coverage meets current threshold!' : '❌ Coverage below threshold. Please add more tests.'}
          
          See [TEST_COVERAGE_ROADMAP.md](https://github.com/${{ github.repository }}/blob/main/TEST_COVERAGE_ROADMAP.md) for improvement plan.
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });