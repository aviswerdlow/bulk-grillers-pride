name: Branch Protection Status

on:
  workflow_dispatch:
  schedule:
    # Run weekly to ensure protection rules remain in place
    - cron: '0 0 * * 0'

jobs:
  check-protection:
    name: Verify Branch Protection
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check branch protection status
        id: check-protection
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "## 🛡️ Branch Protection Status Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Repository: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "Branch: main" >> $GITHUB_STEP_SUMMARY
          echo "Date: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check if branch protection is enabled
          PROTECTION_STATUS=$(gh api repos/${{ github.repository }}/branches/main/protection 2>&1 || echo "NOT_PROTECTED")

          if [[ "$PROTECTION_STATUS" == "NOT_PROTECTED" ]] || [[ "$PROTECTION_STATUS" == *"404"* ]]; then
            echo "❌ **Branch protection is NOT enabled!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Required Action" >> $GITHUB_STEP_SUMMARY
            echo "Run the following command to enable protection:" >> $GITHUB_STEP_SUMMARY
            echo '```bash' >> $GITHUB_STEP_SUMMARY
            echo "node .github/scripts/setup-branch-protection.js" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "protection-enabled=false" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ **Branch protection is enabled**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Parse protection rules
            echo "### Protection Rules" >> $GITHUB_STEP_SUMMARY
            
            # Check PR reviews
            PR_REVIEWS=$(echo "$PROTECTION_STATUS" | jq -r '.required_pull_request_reviews.required_approving_review_count // 0')
            DISMISS_STALE=$(echo "$PROTECTION_STATUS" | jq -r '.required_pull_request_reviews.dismiss_stale_reviews // false')
            echo "- ✅ Required PR reviews: $PR_REVIEWS" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Dismiss stale reviews: $DISMISS_STALE" >> $GITHUB_STEP_SUMMARY
            
            # Check status checks
            STRICT_CHECKS=$(echo "$PROTECTION_STATUS" | jq -r '.required_status_checks.strict // false')
            STATUS_CHECKS=$(echo "$PROTECTION_STATUS" | jq -r '.required_status_checks.contexts[]' 2>/dev/null | wc -l)
            echo "- ✅ Require up-to-date branches: $STRICT_CHECKS" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Required status checks: $STATUS_CHECKS" >> $GITHUB_STEP_SUMMARY
            
            # Check admin enforcement
            ENFORCE_ADMINS=$(echo "$PROTECTION_STATUS" | jq -r '.enforce_admins.enabled // false')
            echo "- ✅ Enforce for administrators: $ENFORCE_ADMINS" >> $GITHUB_STEP_SUMMARY
            
            # Check force push protection
            ALLOW_FORCE=$(echo "$PROTECTION_STATUS" | jq -r '.allow_force_pushes.enabled // true')
            ALLOW_DELETIONS=$(echo "$PROTECTION_STATUS" | jq -r '.allow_deletions.enabled // true')
            echo "- ✅ Prevent force pushes: $([ "$ALLOW_FORCE" = "false" ] && echo "Yes" || echo "No")" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Prevent deletions: $([ "$ALLOW_DELETIONS" = "false" ] && echo "Yes" || echo "No")" >> $GITHUB_STEP_SUMMARY
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Required Status Checks" >> $GITHUB_STEP_SUMMARY
            echo "$PROTECTION_STATUS" | jq -r '.required_status_checks.contexts[]' 2>/dev/null | while read check; do
              echo "- $check" >> $GITHUB_STEP_SUMMARY
            done || echo "- None configured" >> $GITHUB_STEP_SUMMARY
            
            echo "protection-enabled=true" >> $GITHUB_OUTPUT
          fi

      - name: Create issue if protection disabled
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 Branch Protection Disabled on Main Branch';
            const body = `## Branch Protection Alert

            The main branch is currently **not protected**. This is a security risk that allows:
            - ❌ Direct pushes to main without PR review
            - ❌ Merging code that fails tests
            - ❌ Force pushes that can rewrite history
            - ❌ Branch deletion

            ### Immediate Action Required

            1. Run the branch protection setup script:
               \`\`\`bash
               node .github/scripts/setup-branch-protection.js
               \`\`\`

            2. Or manually configure protection in repository settings

            ### Expected Protection Rules
            - Require pull request reviews (1 minimum)
            - Dismiss stale PR approvals when new commits are pushed
            - Require status checks to pass before merging
            - Require branches to be up to date before merging
            - Include administrators in restrictions
            - Block force pushes and deletions

            cc: @aviswerdlow
            `;

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'branch-protection,security',
              state: 'open'
            });

            const existingIssue = issues.data.find(issue => 
              issue.title.includes('Branch Protection Disabled')
            );

            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['branch-protection', 'security', 'priority-P0']
              });
            }
